# Quick start: fast takeoff and immediate filming
name: quick_start
description: >
  Verifies rapid start → lock → film with a stationary subject.
  No wind, no interruptions.  Two lock-assist pulses to allow
  the drone to settle into a good viewing angle.

duration: 45.0
dt: 0.02
seed: 42

events:
  - { time: 0.0, action: start }
  - { time: 1.0, action: lock }
  - { time: 5.0, action: lock }     # re-assist after initial repositioning

assertions:
  - { metric: filming_percent,  op: gte, value: 10.0 }
  - { metric: min_battery,      op: gte, value: 70.0 }
  - { metric: final_battery,    op: gte, value: 70.0 }
